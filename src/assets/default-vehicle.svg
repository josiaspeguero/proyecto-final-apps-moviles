<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Background -->
  <rect width="200" height="120" fill="#f5f5f5"/>
  
  <!-- Car body -->
  <ellipse cx="100" cy="60" rx="70" ry="30" fill="#007bff" opacity="0.8"/>
  
  <!-- Car top -->
  <rect x="45" y="35" width="110" height="25" rx="8" fill="#0056b3"/>
  
  <!-- Windows -->
  <rect x="55" y="38" width="25" height="15" fill="#b3d9ff" rx="2"/>
  <rect x="120" y="38" width="25" height="15" fill="#b3d9ff" rx="2"/>
  
  <!-- Wheels -->
  <circle cx="65" cy="82" r="12" fill="#333"/>
  <circle cx="65" cy="82" r="8" fill="#666"/>
  <circle cx="135" cy="82" r="12" fill="#333"/>
  <circle cx="135" cy="82" r="8" fill="#666"/>
  
  <!-- Details -->
  <rect x="50" y="70" width="100" height="8" fill="#0056b3" rx="2"/>
</svg>
