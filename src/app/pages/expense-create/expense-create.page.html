<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/expenses/' + vehiculoId"></ion-back-button>
    </ion-buttons>
    <ion-title>Registrar Gasto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="loadingCats" class="ion-text-center">
    <ion-spinner></ion-spinner>
    <p>Cargando categorías...</p>
  </div>

  <form *ngIf="!loadingCats" [formGroup]="expenseForm" (ngSubmit)="onSave()">
    <ion-item>
      <ion-label position="stacked">Categoría</ion-label>
      <ion-select formControlName="categoriaId" placeholder="Selecciona una categoría">
        <ion-select-option *ngFor="let cat of categories" [value]="cat.id || cat.categoriaId">{{ cat.nombre || cat.descripcion || cat.categoria }}</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Monto</ion-label>
      <ion-input type="number" formControlName="monto"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Descripción</ion-label>
      <ion-input type="text" formControlName="descripcion"></ion-input>
    </ion-item>

    <ion-button expand="block" color="danger" type="submit" class="ion-margin-top" [disabled]="expenseForm.invalid || saving">
      {{ saving ? 'Guardando...' : 'Guardar Gasto' }}
    </ion-button>
  </form>
</ion-content>
