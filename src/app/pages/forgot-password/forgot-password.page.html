<ion-header>
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Recuperar Contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="container" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
    <h2 class="ion-text-center">¿Olvidaste tu clave?</h2>
    <p class="ion-text-center">Ingresa tu matrícula para enviarte una contraseña temporal.</p>

    <ion-item>
      <ion-label position="floating">Matrícula</ion-label>
      <ion-input type="text" [(ngModel)]="matricula" placeholder="Ej: 20240096"></ion-input>
    </ion-item>

    <ion-button expand="block" color="warning" shape="round" class="ion-margin-top" (click)="onForgot()" [disabled]="!matricula || loading">
      {{ loading ? 'Solicitando...' : 'Recuperar' }}
    </ion-button>
  </div>
</ion-content>
