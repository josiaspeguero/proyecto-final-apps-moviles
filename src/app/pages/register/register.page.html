<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="container" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
    <h2 class="ion-text-center">Crea tu cuenta</h2>
    <ion-item>
      <ion-label position="floating">Matrícula</ion-label>
      <ion-input type="text" [(ngModel)]="matricula" placeholder="Ej: 20240096"></ion-input>
    </ion-item>

    <ion-button expand="block" shape="round" class="ion-margin-top" (click)="onRegister()" [disabled]="!matricula || loading">
      {{ loading ? 'Enviando...' : 'Registrarme' }}
    </ion-button>

    <ion-button expand="block" fill="clear" routerLink="/login">
      ¿Ya tienes cuenta? Inicia sesión
    </ion-button>
  </div>
</ion-content>
