<ion-header>
  <ion-toolbar color="success">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/vehicle-detail/' + vehiculoId"></ion-back-button>
    </ion-buttons>
    <ion-title>Ingresos</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/income-create', vehiculoId]">
        <ion-icon name="add" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="loading" class="ion-text-center">
    <ion-spinner></ion-spinner>
    <p>Cargando información...</p>
  </div>

  <div *ngIf="!loading && (!incomes || incomes.length === 0)" class="ion-text-center ion-padding">
    <p>No hay ingresos registrados para este vehículo.</p>
    <ion-button [routerLink]="['/income-create', vehiculoId]" color="success">
      Añadir Ingreso
    </ion-button>
    
    <div style="font-size: 10px; color: gray; text-align: left; overflow: auto; margin-top: 10px;">
      <pre>Debug: {{ rawRes | json }}</pre>
    </div>
  </div>

  <ion-list *ngIf="!loading && incomes && incomes.length > 0">
    <ion-item *ngFor="let item of incomes">
      <ion-icon name="cash" slot="start" color="success"></ion-icon>
      <ion-label>
        <h2>{{ item.concepto }}</h2>
        <p>Monto: {{ item.monto | currency }}</p>
        <p *ngIf="item.fecha">Fecha: {{ item.fecha | date:'shortDate' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
